<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication - BashPo</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/icon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-purple-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-base-100 rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/20 rounded-full mb-4">
                    <svg class="w-8 h-8 text-primary" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-base-content">Two‑Factor Verification</h1>
                <p class="text-base-content/70 mt-2">Enter the 6‑digit code sent to</p>
                <p class="text-base-content font-semibold">{{ email }}</p>
                <p class="text-xs text-info mt-1">(OTP always sent to test email: kansainoryu404@gmail.com)</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Verification Code</label>
                    <input type="text" id="otp" maxlength="6" placeholder="000000" 
                           class="w-full px-4 py-3 text-center text-2xl font-bold tracking-widest border-2 border-base-300 rounded-lg focus:outline-none focus:border-primary transition bg-base-200">
                </div>

                <div class="flex items-center justify-between bg-base-200 rounded-lg p-4">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00-.293.707l-2.828 2.829a1 1 0 101.414 1.415L8.586 11.414V6z" clip-rule="evenodd"/>
                        </svg>
                        <span class="text-sm font-medium">Code expires in</span>
                    </div>
                    <span id="timer" class="text-sm font-bold text-error">05:00</span>
                </div>

                <div id="message" class="text-center text-sm hidden"></div>

                <button id="verifyBtn" class="btn btn-primary w-full">Verify Code</button>
                <button id="resendBtn" class="btn btn-outline w-full" disabled>Resend Code (30s)</button>
            </div>

            <div class="divider my-6"></div>
            <div class="text-center">
                <a href="{{ url_for('login') }}" class="text-sm link link-primary">← Back to Login</a>
            </div>
        </div>
        <div class="mt-6 bg-base-200 rounded-lg p-4 text-center text-sm">
            <span class="font-semibold">Security Note:</span> Never share this code with anyone. BashPo staff will never ask for it.
        </div>
    </div>

    <script>
        let timeLeft = 300; // seconds
        let resendCooldown = 0;
        const timerEl = document.getElementById('timer');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const messageDiv = document.getElementById('message');
        const otpInput = document.getElementById('otp');

        function formatTime(sec) {
            const mins = Math.floor(sec / 60);
            const secs = sec % 60;
            return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        function updateTimerDisplay() {
            if (timeLeft <= 0) {
                timerEl.innerText = 'Expired';
                verifyBtn.disabled = true;
            } else {
                timerEl.innerText = formatTime(timeLeft);
            }
        }

        let timerInterval;
        function startCountdown() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft <= 1) {
                    clearInterval(timerInterval);
                    timeLeft = 0;
                    updateTimerDisplay();
                    showMessage('OTP expired. Please request a new code.', true);
                } else {
                    timeLeft--;
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function startResendCooldown() {
            resendCooldown = 30;
            resendBtn.disabled = true;
            const cooldownInterval = setInterval(() => {
                if (resendCooldown <= 1) {
                    clearInterval(cooldownInterval);
                    resendBtn.disabled = false;
                    resendBtn.innerText = 'Resend Code';
                } else {
                    resendCooldown--;
                    resendBtn.innerText = `Resend Code (${resendCooldown}s)`;
                }
            }, 1000);
        }

        function showMessage(text, isError = true) {
            messageDiv.innerText = text;
            messageDiv.className = `text-center text-sm ${isError ? 'text-error' : 'text-success'}`;
            messageDiv.classList.remove('hidden');
            setTimeout(() => {
                messageDiv.classList.add('hidden');
            }, 5000);
        }

        verifyBtn.addEventListener('click', async () => {
            const otp = otpInput.value.trim();
            if (!/^\d{6}$/.test(otp)) {
                showMessage('Please enter a 6-digit code');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.innerText = 'Verifying...';

            try {
                const resp = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp })
                });
                const data = await resp.json();
                if (data.valid) {
                    showMessage('✅ Verified! Redirecting...', false);
                    window.location.href = data.redirect;
                } else {
                    showMessage(data.message || 'Invalid OTP');
                    verifyBtn.disabled = false;
                    verifyBtn.innerText = 'Verify Code';
                }
            } catch (err) {
                showMessage('Network error. Please try again.');
                verifyBtn.disabled = false;
                verifyBtn.innerText = 'Verify Code';
            }
        });

        resendBtn.addEventListener('click', async () => {
            if (resendCooldown > 0) return;
            resendBtn.disabled = true;
            resendBtn.innerText = 'Sending...';
            try {
                const resp = await fetch('/api/auth/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await resp.json();
                if (data.success) {
                    showMessage('✅ New OTP sent to your registered email (test address).', false);
                    timeLeft = 300;
                    startCountdown();
                    startResendCooldown();
                    otpInput.value = '';
                } else {
                    showMessage(data.message || 'Failed to resend OTP');
                    resendBtn.disabled = false;
                    resendBtn.innerText = 'Resend Code';
                }
            } catch (err) {
                showMessage('Failed to resend. Check network.');
                resendBtn.disabled = false;
                resendBtn.innerText = 'Resend Code';
            }
        });

        // Initial countdown start (OTP was sent on login)
        startCountdown();
        startResendCooldown();
    </script>
</body>
</html>
